<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureAuth - Initializing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <!-- Logo Section -->
      <div class="logo-container">
        <div class="logo-icon">
          <span class="material-icons" style="font-size: 32px;">security</span>
        </div>
        <div class="logo-text">SecureAuth</div>
      </div>

      <!-- Loader Section -->
      <div class="loader-box">
        <div class="spinner"></div>
        <div>
          <div class="loader-text">Initializing SecureAuth</div>
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
        <div class="progress-container">
          <div class="progress-bar"></div>
        </div>
        <div class="subtitle">Setting up your secure environment</div>
      </div>

      <p class="text-below">
        Redirecting to <a href="auth/login.html">sign in</a>...
      </p>
    </div>

    <script>
      console.log("✅ Index page loaded - Starting secure authentication flow");
      
      // Redirect after 3.5 seconds to allow loader animation to complete
      setTimeout(() => {
        console.log("🚀 Redirecting to login...");
        window.location.href = "auth/login.html";
      }, 3500);

      // Fallback redirect if JavaScript is disabled
      document.head.innerHTML += '<meta http-equiv="refresh" content="4; url=auth/login.html" />';
    </script>
  </body>
</html>
