<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activate Account</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <form class="auth-form" autocomplete="off">
      <h2>Activate Account</h2>
      <p style="font-size:13px;color:#666;text-align:center;margin-bottom:16px;">
        Your account is deactivated. Enter your credentials to reactivate it.
      </p>

      <div id="phoneField" class="field">
        <label>Phone Number</label>
        <div class="phone-container">
          <select id="countryCode"></select>
          <input type="text" id="phone" placeholder="Enter phone number" />
        </div>
      </div>

      <div id="emailField" class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email address" />
      </div>

      <div class="field password-field">
        <label>Password <span class="asterik">*</span></label>
        <input type="password" id="password" placeholder="Enter password" required />
        <span class="toggle-eye" data-target="password">👁</span>
      </div>

      <button type="submit">Activate Account</button>
      <div id="activateError" class="error" style="text-align:center;margin-top:8px;"></div>
      <div id="activateSuccess" class="success"></div>
      <p class="switch"><a href="login.html">← Back to Login</a></p>
    </form>

    <script src="../env.js"></script>
    <script src="countries.js"></script>
    <script src="activate.js"></script>
  </body>
</html>
