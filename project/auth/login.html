<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="card">
        <div class="card-header">
          <div class="logo">
            <div class="logo-icon">🔓</div>
            <div class="logo-name">AuthService</div>
          </div>
          <h2>Welcome Back</h2>
          <p>Sign in to access your account</p>
        </div>

        <form class="auth-form" autocomplete="off">

          <!-- Phone Field -->
          <div id="phoneField" class="field">
            <label for="countryCode">Phone Number</label>
            <div class="phone-container">
              <select id="countryCode"></select>
              <input type="text" id="phone" placeholder="Enter phone number" />
            </div>
            <small id="phoneError" class="error"></small>
          </div>

          <!-- Email Field -->
          <div id="emailField" class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" />
          </div>

          <!-- Password Field -->
          <div class="field password-field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required />
            <small id="passwordError" class="error"></small>
          </div>

          <!-- Login Button -->
          <button type="submit">Sign In</button>

          <!-- Messages -->
          <div id="successMessage" class="success"></div>
          <div id="loginError" class="error"></div>

        </form>

        <!-- Links -->
        <div class="links-section">
          <p class="forgot"><a href="forget.html">Forgot your password?</a></p>
          <div class="divider"></div>
          <p class="switch">
            Don't have an account? <a href="signup.html">Create one</a>
          </p>
        </div>
      </div>
    </div>

    <script src="../env.js"></script>
    <script src="countries.js"></script>
    <script src="validation.js"></script>
    <script src="messages.js"></script>
    <script type="module" src="login.js"></script>

  </body>
</html>
