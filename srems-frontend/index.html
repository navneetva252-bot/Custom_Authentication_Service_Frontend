<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Software Requirement Engineering Management System - Frontend">
  <meta name="theme-color" content="#007BFF">
  
  <title>SREMS - Management Dashboard</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23007BFF'>S</text></svg>">
  
  <!-- CSS Files -->
  <link rel="stylesheet" href="./src/styles/main.css">
  
  <!-- Meta tags for SEO -->
  <meta name="author" content="SREMS Team">
  <meta name="copyright" content="2026">
</head>
<body>
  <!-- Main Application Container -->
  <div id="app" class="app-container">
    
    <!-- Loading indicator -->
    <div id="app-loading" class="app-loading hidden">
      <div class="spinner"></div>
      <p>Loading SREMS...</p>
    </div>

    <!-- Navigation Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="header-left">
          <h1 class="app-logo">
            <span class="logo-icon">📋</span>
            <span class="logo-text">SREMS</span>
          </h1>
          <nav class="main-nav">
            <ul>
              <li><a href="#/" data-link="/" class="nav-link">Dashboard</a></li>
              <li><a href="#/projects" data-link="/projects" class="nav-link">Projects</a></li>
              <li><a href="#/activity" data-link="/activity" class="nav-link">Activity</a></li>
            </ul>
          </nav>
        </div>
        
        <div class="header-right">
          <button class="btn-theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
          <div class="user-menu">
            <span id="user-name" class="user-name">User</span>
            <button id="logout-btn" class="btn btn-sm btn-outline-primary">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main" id="page-content">
      <!-- Content loads here dynamically -->
      <div class="page-loading">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
    </main>

    <!-- Modal Container -->
    <div class="modal-backdrop"></div>
    <div class="modal" id="appModal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Modal</h2>
        <button class="modal-close-btn" aria-label="Close">×</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Modal content loaded here -->
      </div>
      <div class="modal-footer" id="modalFooter">
        <!-- Footer buttons -->
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

  </div>

  <!-- Scripts -->
  <!-- Main application script -->
  <script type="module" src="./src/js/app.js"></script>


  <style>
    /* Additional app-specific styles */
    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      background: white;
      border-bottom: 1px solid #eee;
      box-shadow: var(--shadow-base);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-base) var(--spacing-lg);
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
    }

    .app-logo {
      display: flex;
      align-items: center;
      gap: var(--spacing-base);
      margin: 0;
      font-size: var(--font-size-xl);
    }

    .logo-icon {
      font-size: var(--font-size-2xl);
    }

    .main-nav ul {
      display: flex;
      list-style: none;
      gap: var(--spacing-lg);
    }

    .nav-link {
      padding: var(--spacing-sm) var(--spacing-base);
      transition: color var(--transition-fast);
    }

    .nav-link:hover {
      color: var(--color-primary);
      text-decoration: none;
    }

    .app-main {
      flex: 1;
      display: flex;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .app-sidebar {
      width: 250px;
      background: white;
      border-right: 1px solid #eee;
      padding: var(--spacing-lg);
    }

    .sidebar-nav ul {
      list-style: none;
    }

    .sidebar-nav li {
      margin: var(--spacing-base) 0;
    }

    .sidebar-link {
      display: block;
      padding: var(--spacing-base);
      border-radius: var(--border-radius-base);
      transition: all var(--transition-fast);
    }

    .sidebar-link:hover {
      background: #f0f0f0;
      text-decoration: none;
      color: var(--color-primary);
    }

    .app-content {
      flex: 1;
      padding: var(--spacing-lg);
      overflow-y: auto;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .page-header {
      margin-bottom: var(--spacing-xl);
    }

    .page-header h1 {
      margin: 0;
    }

    .page-subtitle {
      color: #999;
      margin: var(--spacing-sm) 0 0 0;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-xl);
    }

    .stat-card {
      background: white;
      padding: var(--spacing-lg);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-base);
      display: flex;
      gap: var(--spacing-lg);
    }

    .stat-icon {
      font-size: var(--font-size-2xl);
    }

    .stat-content h3 {
      margin: 0;
      font-size: var(--font-size-sm);
      color: #999;
      text-transform: uppercase;
    }

    .stat-value {
      margin: var(--spacing-base) 0 0 0;
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-primary);
    }

    .quick-actions,
    .recent-activity {
      background: white;
      padding: var(--spacing-lg);
      border-radius: var(--border-radius-lg);
      margin-bottom: var(--spacing-lg);
    }

    .action-buttons {
      display: flex;
      gap: var(--spacing-base);
      margin-top: var(--spacing-base);
    }

    .activity-list {
      margin-top: var(--spacing-base);
    }

    .project-card {
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .project-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .project-meta {
      display: flex;
      gap: var(--spacing-base);
      margin-top: var(--spacing-base);
      align-items: center;
    }

    .btn-theme-toggle {
      background: none;
      border: none;
      font-size: var(--font-size-lg);
      cursor: pointer;
      padding: var(--spacing-sm);
      transition: transform var(--transition-fast);
    }

    .btn-theme-toggle:hover {
      transform: scale(1.1);
    }

    .app-loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    @media (max-width: 768px) {
      .app-main {
        flex-direction: column;
      }

      .app-sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #eee;
        padding: var(--spacing-base);
      }

      .main-nav {
        display: none;
      }

      .header-content {
        flex-direction: column;
        gap: var(--spacing-base);
      }

      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

</body>
</html>
